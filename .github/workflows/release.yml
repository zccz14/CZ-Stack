name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-check:
    name: Release readiness
    runs-on: ubuntu-latest
    outputs:
      has_changesets: ${{ steps.detect.outputs.has_changesets }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup workspace with Playwright
        uses: ./.github/actions/setup-node-pnpm
        with:
          install-playwright: "true"

      - name: Run pre-release checks
        run: pnpm release:check

      - name: Detect pending changesets
        id: detect
        shell: bash
        run: |
          pnpm exec changeset status --output=.changeset/status.json
          node --input-type=module --eval "import { readFileSync } from 'node:fs'; const status = JSON.parse(readFileSync('.changeset/status.json', 'utf8')); process.stdout.write('has_changesets=' + (status.releases.length > 0 ? '1' : '0') + '\n');" >> "$GITHUB_OUTPUT"

  version-or-prepare-release:
    name: Version PR / release prep
    needs: release-check
    if: needs.release-check.outputs.has_changesets == '1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup workspace
        uses: ./.github/actions/setup-node-pnpm

      - name: Create or update version PR
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
